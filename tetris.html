<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tetris</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a1a;
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    touch-action: none;
  }
  .game-wrapper {
    background: #111128;
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 0 60px rgba(0,100,255,0.15);
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .left-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  canvas#board {
    display: block;
    border: 2px solid #2a2a5a;
    border-radius: 8px;
    background: #0d0d22;
  }
  .info-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 140px;
  }
  .info-box {
    background: #0d0d22;
    border: 1px solid #2a2a5a;
    border-radius: 12px;
    padding: 14px 18px;
    text-align: center;
  }
  .info-box .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #667;
    margin-bottom: 4px;
  }
  .info-box .value {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .info-box .value.score { color: #4fc3f7; }
  .info-box .value.lines { color: #81c784; }
  .info-box .value.level { color: #ffb74d; }
  canvas#next {
    display: block;
    margin: 8px auto 0;
    background: #0d0d22;
    border-radius: 6px;
  }
  .controls-hint {
    font-size: 12px;
    color: #556;
    text-align: center;
    margin-top: 4px;
    line-height: 1.6;
  }
  .controls-hint kbd {
    background: #1a1a3a;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    border: 1px solid #333;
  }
  button {
    background: #1a3a6a;
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    width: 100%;
  }
  button:hover { background: #2a5a9a; transform: scale(1.03); }
  button:active { transform: scale(0.97); }
  button.restart { background: #6a1a2a; }
  button.restart:hover { background: #9a2a3a; }
  .footer {
    margin-top: 8px;
    font-size: 11px;
    color: #445;
  }
  #game-over-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    backdrop-filter: blur(4px);
    gap: 12px;
  }
  #game-over-overlay.show { display: flex; }
  #game-over-overlay h2 {
    font-size: 32px;
    color: #ff5252;
    text-shadow: 0 0 20px rgba(255,50,50,0.5);
  }
  #game-over-overlay p { color: #aaa; font-size: 15px; }
  .board-container {
    position: relative;
  }
  @media (max-width: 600px) {
    .game-wrapper { padding: 12px; gap: 12px; border-radius: 16px; }
    .info-box { padding: 10px 12px; }
    .info-box .value { font-size: 22px; }
    canvas#board { max-width: 90vw; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="left-panel">
    <div class="board-container">
      <canvas id="board" width="300" height="600"></canvas>
      <div id="game-over-overlay">
        <h2>GAME OVER</h2>
        <p>Score: <span id="final-score">0</span></p>
        <button class="restart" onclick="restartGame()">Play Again</button>
      </div>
    </div>
  </div>
  <div class="info-panel">
    <div class="info-box">
      <div class="label">Score</div>
      <div class="value score" id="score">0</div>
    </div>
    <div class="info-box">
      <div class="label">Lines</div>
      <div class="value lines" id="lines">0</div>
    </div>
    <div class="info-box">
      <div class="label">Level</div>
      <div class="value level" id="level">1</div>
    </div>
    <div class="info-box">
      <div class="label">Next</div>
      <canvas id="next" width="120" height="120"></canvas>
    </div>
    <button onclick="restartGame()">New Game</button>
    <button class="restart" onclick="togglePause()" id="pause-btn">Pause</button>
    <div class="controls-hint">
      <kbd>←</kbd> <kbd>→</kbd> Move &nbsp;·&nbsp; <kbd>↑</kbd> Rotate<br>
      <kbd>↓</kbd> Soft drop &nbsp;·&nbsp; <kbd>Space</kbd> Hard drop<br>
      <kbd>P</kbd> Pause &nbsp;·&nbsp; <kbd>R</kbd> Restart
    </div>
    <div class="footer">✦ classic tetris</div>
  </div>
</div>

<script>
// ─── Tetris ────────────────────────────────────────────────────────────────

const COLS = 10;
const ROWS = 20;
const BLOCK_SIZE = 30;
const EMPTY = 0;

let board = [];
let score = 0;
let lines = 0;
let level = 1;
let gameOver = false;
let paused = false;

// 7 standard Tetrominoes (I, O, T, S, Z, J, L)
const SHAPES = [
  { // I
    matrix: [[1,1,1,1]],
    color: '#00f0f0'
  },
  { // O
    matrix: [[1,1],[1,1]],
    color: '#f0f000'
  },
  { // T
    matrix: [[0,1,0],[1,1,1]],
    color: '#a000f0'
  },
  { // S
    matrix: [[0,1,1],[1,1,0]],
    color: '#00f000'
  },
  { // Z
    matrix: [[1,1,0],[0,1,1]],
    color: '#f00000'
  },
  { // J
    matrix: [[1,0,0],[1,1,1]],
    color: '#0000f0'
  },
  { // L
    matrix: [[0,0,1],[1,1,1]],
    color: '#f0a000'
  }
];

let currentPiece = null;
let nextPiece = null;
let bag = [];

// DOM refs
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next');
const nextCtx = nextCanvas.getContext('2d');
const scoreEl = document.getElementById('score');
const linesEl = document.getElementById('lines');
const levelEl = document.getElementById('level');
const finalScoreEl = document.getElementById('final-score');
const gameOverEl = document.getElementById('game-over-overlay');
const pauseBtn = document.getElementById('pause-btn');

// Timing
let dropInterval = 1000;
let lastDrop = 0;
let animationId = null;

// ─── 7-bag randomizer ─────────────────────────────────────────────────────

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function refillBag() {
  bag = shuffleArray([0,1,2,3,4,5,6]);
}

function nextFromBag() {
  if (bag.length === 0) refillBag();
  return bag.pop();
}

// ─── Board ops ────────────────────────────────────────────────────────────

function createBoard() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(EMPTY));
}

function createPiece(type) {
  const shape = SHAPES[type];
  const matrix = shape.matrix.map(row => [...row]);
  return {
    type,
    matrix,
    color: shape.color,
    x: Math.floor((COLS - matrix[0].length) / 2),
    y: 0
  };
}

function rotateMatrix(matrix) {
  const rows = matrix.length;
  const cols = matrix[0].length;
  const rotated = Array.from({length: cols}, (_, c) =>
    Array.from({length: rows}, (_, r) => matrix[rows - 1 - r][c])
  );
  return rotated;
}

function collides(piece, offsetX = 0, offsetY = 0) {
  const { matrix, x, y } = piece;
  for (let r = 0; r < matrix.length; r++) {
    for (let c = 0; c < matrix[0].length; c++) {
      if (matrix[r][c]) {
        const newX = x + c + offsetX;
        const newY = y + r + offsetY;
        if (newX < 0 || newX >= COLS || newY >= ROWS || newY < 0) return true;
        if (newY >= 0 && board[newY][newX] !== EMPTY) return true;
      }
    }
  }
  return false;
}

function lockPiece() {
  const { matrix, x, y, color } = currentPiece;
  for (let r = 0; r < matrix.length; r++) {
    for (let c = 0; c < matrix[0].length; c++) {
      if (matrix[r][c]) {
        const boardY = y + r;
        const boardX = x + c;
        if (boardY < 0) {
          triggerGameOver();
          return;
        }
        board[boardY][boardX] = { color };
      }
    }
  }
  clearLines();
  spawnPiece();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(cell => cell !== EMPTY)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(EMPTY));
      cleared++;
      r++; // re-check same row
    }
  }
  if (cleared > 0) {
    const points = [0, 100, 300, 500, 800];
    addScore(points[Math.min(cleared, 4)] * level);
    lines += cleared;
    linesEl.textContent = lines;
    const newLevel = Math.floor(lines / 10) + 1;
    if (newLevel > level) {
      level = newLevel;
      levelEl.textContent = level;
      dropInterval = Math.max(100, 1000 - (level - 1) * 80);
    }
  }
}

function addScore(pts) {
  score += pts;
  scoreEl.textContent = score;
}

// ─── Game flow ────────────────────────────────────────────────────────────

function spawnPiece() {
  if (gameOver) return;
  currentPiece = nextPiece || createPiece(nextFromBag());
  nextPiece = createPiece(nextFromBag());
  drawNext();

  if (collides(currentPiece)) {
    triggerGameOver();
  }
}

function triggerGameOver() {
  gameOver = true;
  finalScoreEl.textContent = score;
  gameOverEl.classList.add('show');
}

function restartGame() {
  board = createBoard();
  score = 0;
  lines = 0;
  level = 1;
  gameOver = false;
  paused = false;
  pauseBtn.textContent = 'Pause';
  dropInterval = 1000;
  bag = [];
  scoreEl.textContent = '0';
  linesEl.textContent = '0';
  levelEl.textContent = '1';
  gameOverEl.classList.remove('show');

  nextPiece = createPiece(nextFromBag());
  spawnPiece();
  draw();
}

function togglePause() {
  if (gameOver) return;
  paused = !paused;
  pauseBtn.textContent = paused ? 'Resume' : 'Pause';
  if (!paused) {
    lastDrop = performance.now();
  }
}

// ─── Movement ─────────────────────────────────────────────────────────────

function moveLeft() {
  if (gameOver || paused || !currentPiece) return;
  if (!collides(currentPiece, -1, 0)) {
    currentPiece.x--;
    draw();
  }
}

function moveRight() {
  if (gameOver || paused || !currentPiece) return;
  if (!collides(currentPiece, 1, 0)) {
    currentPiece.x++;
    draw();
  }
}

function moveDown() {
  if (gameOver || paused || !currentPiece) return;
  if (!collides(currentPiece, 0, 1)) {
    currentPiece.y++;
    draw();
    return true;
  } else {
    lockPiece();
    draw();
    return false;
  }
}

function rotatePiece() {
  if (gameOver || paused || !currentPiece) return;
  const rotated = rotateMatrix(currentPiece.matrix);
  const original = currentPiece.matrix;
  currentPiece.matrix = rotated;

  // Wall kick: try shifting left/right if rotation causes collision
  if (collides(currentPiece)) {
    // Try left shift
    currentPiece.x--;
    if (!collides(currentPiece)) { draw(); return; }
    currentPiece.x += 2; // try right shift
    if (!collides(currentPiece)) { draw(); return; }
    currentPiece.x--; // revert
    // Reset to original
    currentPiece.matrix = original;
  } else {
    draw();
  }
}

function hardDrop() {
  if (gameOver || paused || !currentPiece) return;
  let dropDist = 0;
  while (!collides(currentPiece, 0, dropDist + 1)) {
    dropDist++;
  }
  currentPiece.y += dropDist;
  addScore(dropDist * 2);
  lockPiece();
  draw();
}

// ─── Drawing ──────────────────────────────────────────────────────────────

function drawBlock(context, x, y, color, size = BLOCK_SIZE) {
  const margin = 1;
  context.fillStyle = color;
  context.fillRect(x * size + margin, y * size + margin, size - margin * 2, size - margin * 2);

  // Highlight
  context.fillStyle = 'rgba(255,255,255,0.12)';
  context.fillRect(x * size + margin, y * size + margin, size - margin * 2, 3);
  context.fillRect(x * size + margin, y * size + margin, 3, size - margin * 2);

  // Shadow
  context.fillStyle = 'rgba(0,0,0,0.2)';
  context.fillRect(x * size + margin, (y + 1) * size - margin - 3, size - margin * 2, 3);
  context.fillRect((x + 1) * size - margin - 3, y * size + margin, 3, size - margin * 2);
}

function draw() {
  // Clear board
  ctx.fillStyle = '#0d0d22';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * BLOCK_SIZE);
    ctx.lineTo(canvas.width, r * BLOCK_SIZE);
    ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c * BLOCK_SIZE, 0);
    ctx.lineTo(c * BLOCK_SIZE, canvas.height);
    ctx.stroke();
  }

  // Locked blocks
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = board[r][c];
      if (cell !== EMPTY) {
        drawBlock(ctx, c, r, cell.color);
      }
    }
  }

  // Ghost piece (shadow)
  if (currentPiece && !gameOver) {
    let ghostY = 0;
    while (!collides(currentPiece, 0, ghostY + 1)) ghostY++;
    const { matrix, x, y, color } = currentPiece;
    ctx.globalAlpha = 0.15;
    for (let r = 0; r < matrix.length; r++) {
      for (let c = 0; c < matrix[0].length; c++) {
        if (matrix[r][c]) {
          drawBlock(ctx, x + c, y + r + ghostY, color);
        }
      }
    }
    ctx.globalAlpha = 1;
  }

  // Current piece
  if (currentPiece && !gameOver) {
    const { matrix, x, y, color } = currentPiece;
    for (let r = 0; r < matrix.length; r++) {
      for (let c = 0; c < matrix[0].length; c++) {
        if (matrix[r][c]) {
          drawBlock(ctx, x + c, y + r, color);
        }
      }
    }
  }

  // Pause overlay
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
  }
}

function drawNext() {
  nextCtx.fillStyle = '#0d0d22';
  nextCtx.fillRect(0, 0, 120, 120);
  if (!nextPiece) return;
  const { matrix, color } = nextPiece;
  const size = 24;
  const offsetX = (120 - matrix[0].length * size) / 2;
  const offsetY = (120 - matrix.length * size) / 2;

  for (let r = 0; r < matrix.length; r++) {
    for (let c = 0; c < matrix[0].length; c++) {
      if (matrix[r][c]) {
        const x = offsetX + c * size;
        const y = offsetY + r * size;
        const m = 1;
        nextCtx.fillStyle = color;
        nextCtx.fillRect(x + m, y + m, size - m * 2, size - m * 2);
        nextCtx.fillStyle = 'rgba(255,255,255,0.12)';
        nextCtx.fillRect(x + m, y + m, size - m * 2, 2);
        nextCtx.fillRect(x + m, y + m, 2, size - m * 2);
      }
    }
  }
}

// ─── Game loop ────────────────────────────────────────────────────────────

function gameLoop(timestamp) {
  animationId = requestAnimationFrame(gameLoop);
  if (gameOver || paused) return;

  if (timestamp - lastDrop >= dropInterval) {
    lastDrop = timestamp;
    if (currentPiece) {
      if (!collides(currentPiece, 0, 1)) {
        currentPiece.y++;
        draw();
      } else {
        lockPiece();
        draw();
      }
    }
  }
}

// ─── Input ────────────────────────────────────────────────────────────────

document.addEventListener('keydown', (e) => {
  const key = e.key;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) {
    e.preventDefault();
  }
  if (gameOver) {
    if (key === 'r' || key === 'R') restartGame();
    return;
  }
  switch (key) {
    case 'ArrowLeft':  moveLeft(); break;
    case 'ArrowRight': moveRight(); break;
    case 'ArrowDown':  moveDown(); break;
    case 'ArrowUp':    rotatePiece(); break;
    case ' ':          hardDrop(); break;
    case 'p': case 'P': togglePause(); break;
    case 'r': case 'R': restartGame(); break;
  }
});

// Touch controls
let touchStartX = 0;
let touchStartY = 0;
let touchStartTime = 0;
let hasSwiped = false;

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  touchStartX = touch.clientX;
  touchStartY = touch.clientY;
  touchStartTime = Date.now();
  hasSwiped = false;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (hasSwiped) return;
  const touch = e.touches[0];
  const dx = touch.clientX - touchStartX;
  const dy = touch.clientY - touchStartY;
  const threshold = 20;

  if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
    hasSwiped = true;
    if (Math.abs(dx) > Math.abs(dy)) {
      // Horizontal swipe
      if (dx > 0) moveRight();
      else moveLeft();
    } else {
      // Vertical swipe
      if (dy > 0) moveDown();
      else rotatePiece();
    }
    // Reset for continuous swiping
    touchStartX = touch.clientX;
    touchStartY = touch.clientY;
    hasSwiped = false;
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  // Tap = hard drop (short touch with minimal movement)
  const dt = Date.now() - touchStartTime;
  if (dt < 200 && !hasSwiped) {
    hardDrop();
  }
}, { passive: false });

// ─── Init ──────────────────────────────────────────────────────────────────

function init() {
  board = createBoard();
  nextPiece = createPiece(nextFromBag());
  spawnPiece();
  lastDrop = performance.now();
  gameLoop(lastDrop);
  draw();
}

init();
</script>
</body>
</html>
